<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissor</title>
       <link rel="stylesheet" href="styles/10-RockPaperScissors.css">
    </head>
    <body>
        <p class="game">Rock Paper Scissors </p>
        
        <button 
        onclick=" 
        playGame('rock') " class="move-btn">
        <img src="images/rock-emoji.png" class="move-icon">
        </button>


        <button 
        onclick=" 
        playGame('paper')"class="move-btn">
         <img src="images/paper-emoji.png" class="move-icon">
        </button>


        <button
         onclick=" 
         playGame('scissors') "class="move-btn">
         <img src="images/scissors-emoji.png" class="move-icon">
        </button>

        <p class="js-result result">   
        <p class="js-move "></p>
        <p class="js-score score"></p>


        <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        updateScoreElement();  
        "class="reset">Reset score</button>

        <button class="auto-play-btn" onclick="autoplay()">Autoplay</button>
        <script src="Js/10-RockPaperScissors.js"></script>

    </body>
</html>
